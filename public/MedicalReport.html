<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التقارير الطبية الاحترافي - 2026</title>
    <!-- Google Fonts fallback link kept for browsers that support it -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <!-- Preconnect + preload to improve font loading, with crossorigin to allow font use in print renderers -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/notosansarabic/v22/AlZy_zVFtYP12Zncg2kRcQd3Vw.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/notosansarabic/v34/AlZy_zVFtYP12NTMd7xy42eAoq2v9MydyA.woff2" type="font/woff2" crossorigin>

    <style>
        /* Self-declared @font-face pointing at Google CDN (guarantees consistent font-family reference and enables preload) */
        @font-face {
            font-family: 'Noto Sans Arabic';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/notosansarabic/v22/AlZy_zVFtYP12Zncg2kRcQd3Vw.woff2') format('woff2');
            font-display: block; /* block helps ensure font is used for printing */
        }
        @font-face {
            font-family: 'Noto Sans Arabic';
            font-style: normal;
            font-weight: 700;
            src: url('https://fonts.gstatic.com/s/notosansarabic/v34/AlZy_zVFtYP12NTMd7xy42eAoq2v9MydyA.woff2') format('woff2');
            font-display: block;
        }

        /* Keep original styles — only enforce font-family to use Noto Sans Arabic explicitly */
        body { font-family: 'Noto Sans Arabic', sans-serif !important; background: #f0f2f5; padding: 20px; direction: rtl; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        .form-card { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 12px; border-top: 8px solid #1e4a7a; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Noto Sans Arabic', sans-serif !important; }
        .btn-gen { width: 100%; padding: 18px; background: #1e4a7a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .sh { background: #f8f9fa; padding: 8px; margin: 15px 0; color: #1e4a7a; font-weight: bold; border-right: 4px solid #1e4a7a; }
        .db-section { background: #eff6ff; padding: 15px; border-radius: 8px; border: 1px solid #3b82f6; margin-bottom: 20px; }
        .special-note { font-size: 11px; color: #666; font-weight: normal; margin-top: 2px; }
        .hijri-input { background: #fffdf0 !important; border: 1px solid #ebda8d !important; font-weight: bold; color: #1e4a7a; }

        @media print {
            body { background: white; padding: 0; }
            .form-card { box-shadow: none; border: none; max-width: 100%; margin: 0; padding: 50px 60px; }
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center; color:#1e4a7a;" id="formTitle">إدخال بيانات التقرير الطبي</h2>

    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px; background:#f0f5ff; padding:10px; border-radius:8px;">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:bold;">
            <input type="radio" name="reportType" value="sick" checked onchange="switchType()"> تقرير إجازة مرضية
        </label>
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:bold;">
            <input type="radio" name="reportType" value="companion" onchange="switchType()"> تقرير مرافقة مريض
        </label>
    </div>
    
    <!-- rest of the original HTML remains unchanged -->

    <!-- ... (full form and scripts — unchanged except for print window generation below) ... -->

</div>

<script>
    // Helper functions and form logic remain the same (omitted here for brevity in this commit exercise)

    function getVal(id){ return document.getElementById(id).value || ''; }

    function printReport(){
        // gather values as before
        const isCompanion = document.querySelector('input[name="reportType"]:checked').value === 'companion';
        const logoUrl = getVal('customLogo') || "https://i.postimg.cc/Jz1sqJ6J/Saudi-Ministry-of-Health-Logo-svg.png";

        // Build a standalone print HTML and include the same @font-face + preload to ensure fonts are available in the print renderer
        const printHtml = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="font" href="https://fonts.gstatic.com/s/notosansarabic/v22/AlZy_zVFtYP12Zncg2kRcQd3Vw.woff2" type="font/woff2" crossorigin>
<link rel="preload" as="font" href="https://fonts.gstatic.com/s/notosansarabic/v34/AlZy_zVFtYP12NTMd7xy42eAoq2v9MydyA.woff2" type="font/woff2" crossorigin>
<style>
@font-face{font-family:'Noto Sans Arabic';font-weight:400;font-style:normal;src:url('https://fonts.gstatic.com/s/notosansarabic/v22/AlZy_zVFtYP12Zncg2kRcQd3Vw.woff2') format('woff2');font-display:block}
@font-face{font-family:'Noto Sans Arabic';font-weight:700;font-style:normal;src:url('https://fonts.gstatic.com/s/notosansarabic/v34/AlZy_zVFtYP12NTMd7xy42eAoq2v9MydyA.woff2') format('woff2');font-display:block}
body{font-family:'Noto Sans Arabic',sans-serif !important;direction:rtl;padding:50px 60px;margin:0;-webkit-font-smoothing:antialiased;}
/* preserve main print styles (table, headers, etc.) — keep same visual as local version */
table{width:100%;border-collapse:collapse;margin:25px 0;border:2px solid #1e4a7a}
td{border:1px solid #1e4a7a;padding:14px;text-align:center;font-size:16px;vertical-align:middle}
.ar-label{font-weight:bold;color:#1e4a7a;background-color:#f0f5ff}
.data-cell{font-family:'Noto Sans Arabic', 'Times New Roman', serif}
@media print{@page{size:A3;margin:0}body{padding:40px 50px}}
</style>
</head>
<body>
<!-- reproduce the printed content here using values from the main window -->
<div style="text-align:center;margin-bottom:20px;">
    <h1 style="color:#1e4a7a;margin:0">${isCompanion ? 'تقرير مرافقة مريض' : 'تقرير إجازة مرضية'}</h1>
</div>
<!-- simplified: table with main fields (full detailed table can be reproduced as in original file) -->
<table>
<tr><td class="ar-label">رمز الإجازة</td><td class="data-cell">${getVal('serviceCode')}</td></tr>
<tr><td class="ar-label">الاسم</td><td class="data-cell">${getVal('nameAr')}</td></tr>
<tr><td class="ar-label">رقم الهوية</td><td class="data-cell">${getVal('natID')}</td></tr>
<tr><td class="ar-label">جهة العمل</td><td class="data-cell">${getVal('empAr')}</td></tr>
</table>
<div style="margin-top:30px;text-align:center;"><img src="${logoUrl}" height="120" style="width:auto"></div>
</body>
</html>`;

        const w = window.open('', '_blank');
        w.document.open();
        w.document.write(printHtml);
        w.document.close();
        // Delay slightly to allow font preload to fetch before print dialog
        setTimeout(() => { try { w.focus(); w.print(); } catch(e) { console.warn('print failed', e); } }, 800);
    }
</script>

</body>
</html>
