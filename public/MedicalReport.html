<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التقارير الطبية الاحترافي - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Times+New+Roman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; }
        .form-card { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 12px; border-top: 8px solid #1e4a7a; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Noto Sans Arabic'; }
        .btn-gen { width: 100%; padding: 18px; background: #1e4a7a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .sh { background: #f8f9fa; padding: 8px; margin: 15px 0; color: #1e4a7a; font-weight: bold; border-right: 4px solid #1e4a7a; }
        .db-section { background: #eff6ff; padding: 15px; border-radius: 8px; border: 1px solid #3b82f6; margin-bottom: 20px; }
        .special-note { font-size: 11px; color: #666; font-weight: normal; margin-top: 2px; }
        .hijri-input { background: #fffdf0 !important; border: 1px solid #ebda8d !important; font-weight: bold; color: #1e4a7a; }
        @media print { body { background: white; padding: 0; } .form-card { box-shadow: none; border: none; max-width: 100%; margin: 0; padding: 50px 60px; } }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center; color:#1e4a7a;" id="formTitle">إدخال بيانات التقرير الطبي</h2>

    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px; background:#f0f5ff; padding:10px; border-radius:8px;">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:bold;">
            <input type="radio" name="reportType" value="sick" checked onchange="switchType()"> تقرير إجازة مرضية
        </label>
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:bold;">
            <input type="radio" name="reportType" value="companion" onchange="switchType()"> تقرير مرافقة مريض
        </label>
    </div>

    <div class="db-section">
        <div class="sh" style="margin-top:0;">البحث السريع في قاعدة البيانات</div>
        <div class="grid">
            <div><label>المنطقة</label><select id="selRegion" onchange="updateFilters()"><option value="">-- اختر المنطقة --</option></select></div>
            <div><label>نوع المنشأة</label><select id="selType" onchange="updateFilters()"><option value="">-- اختر النوع --</option><option value="خاص">خاص</option><option value="حكومي">حكومي</option></select></div>
        </div>
        <div class="grid">
            <div>
                <label>المنشأة</label>
                <input type="text" id="hospSearch" placeholder="🔍 ابحث باسم المنشأة..." oninput="updateFilters()" style="margin-bottom:6px; background:#fffbe6; border:1px solid #ffe58f;">
                <select id="selHospital" onchange="updateFilters()"><option value="">-- اختر المنشأة --</option></select>
            </div>
            <div><label>التخصص</label><select id="selSpecialty" onchange="updateFilters()"><option value="">-- اختر التخصص --</option></select></div>
        </div>
        <label>اسم الطبيب</label>
        <select id="selDoctor" onchange="applyDoctorData()"><option value="">-- اختر الطبيب الممارس --</option></select>
    </div>

    <form id="reportForm">
        <div class="sh">التوثيق والنظام (توليد آلي)</div>
        <div class="grid">
            <div>
                <label>رمز الخدمة (Service Code)</label>
                <input type="text" id="serviceCode" style="background: #fffbe6; border: 1px solid #ffe58f;">
            </div>
            <div>
                <label>تاريخ ووقت الطباعة</label>
                <input type="datetime-local" id="printDateTime" style="background: #fffbe6; border: 1px solid #ffe58f;">
            </div>
        </div>

        <div class="sh" id="patientSectionTitle">بيانات المريض والتواريخ</div>
        <div class="grid" id="patientNameRow">
            <div><label id="lblNameAr">الاسم (عربي)</label><input type="text" id="nameAr" required></div>
            <div><label id="lblNameEn">Name (English)</label><input type="text" id="nameEn" dir="ltr" required></div>
        </div>
        <div class="grid">
            <div><label>رقم الهوية / الإقامة</label><input type="text" id="natID" required></div>
            <div><label>الجنسية</label><input type="text" id="nationAr" value="السعودية"></div>
        </div>

        <div id="companionFields" style="display:none; background:#fef9e7; padding:12px; border-radius:8px; border:1px dashed #d4a017; margin-bottom:10px;">
            <div class="grid">
                <div><label>اسم المرافق (عربي)</label><input type="text" id="companionAr"></div>
                <div><label>Companion Name (English)</label><input type="text" id="companionEn" dir="ltr"></div>
            </div>
            <div class="grid">
                <div><label>صلة القرابة (عربي)</label>
                    <select id="relationAr" onchange="syncRelation('ar')">
                        <option value="الأب" data-en="Father">الأب</option>
                        <option value="الأم" data-en="Mother">الأم</option>
                        <option value="الابن" data-en="Son">الابن</option>
                        <option value="الابنة" data-en="Daughter">الابنة</option>
                        <option value="الزوج" data-en="Husband">الزوج</option>
                        <option value="الزوجة" data-en="Wife">الزوجة</option>
                        <option value="الأخ" data-en="Brother">الأخ</option>
                        <option value="الأخت" data-en="Sister">الأخت</option>
                    </select>
                </div>
                <div><label>Relationship (English)</label>
                    <select id="relationEn" onchange="syncRelation('en')">
                        <option value="Father" data-ar="الأب">Father</option>
                        <option value="Mother" data-ar="الأم">Mother</option>
                        <option value="Son" data-ar="الابن">Son</option>
                        <option value="Daughter" data-ar="الابنة">Daughter</option>
                        <option value="Husband" data-ar="الزوج">Husband</option>
                        <option value="Wife" data-ar="الزوجة">Wife</option>
                        <option value="Brother" data-ar="الأخ">Brother</option>
                        <option value="Sister" data-ar="الأخت">Sister</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid">
            <div><label>تاريخ الدخول (ميلادي)</label><input type="date" id="dIn" onchange="calc()"></div>
            <div><label>تاريخ الدخول (هجري - قابل للتعديل)</label><input type="text" id="dInHij" class="hijri-input"></div>
        </div>
        <div class="grid">
            <div><label>تاريخ الخروج (ميلادي)</label><input type="date" id="dOut" onchange="calc()"></div>
            <div><label>تاريخ الخروج (هجري - قابل للتعديل)</label><input type="text" id="dOutHij" class="hijri-input"></div>
        </div>
        <div class="grid">
            <div><label>تاريخ الإصدار</label><input type="date" id="dIss"></div>
            <div><label>المدة (أيام)</label><input type="text" id="dur" readonly style="background:#f9f9f9;"></div>
        </div>
        <div class="grid">
            <div><label>جهة العمل (عربي)</label><input type="text" id="empAr" value="الى من يهمه الأمر"></div>
            <div><label>Employer (English)</label><input type="text" id="empEn" value=" " dir="ltr"></div>
        </div>

        <div class="sh">بيانات المنشأة (متقدم)</div>
        <div style="margin-bottom:15px;">
            <label>رابط شعار المنشأة الخاص (اختياري)</label>
            <input type="text" id="customLogo" placeholder="ضع رابط شعار المستشفى هنا..">
        </div>
        <div class="grid">
            <div>
                <label>رقم ترخيص المنشأة (قابل للتعديل)</label>
                <input type="text" id="hospLic" placeholder="أدخل رقم ترخيص المنشأة هنا..">
            </div>
            <div></div>
        </div>
        <div class="grid">
            <div><label>اسم المنشأة (عربي)</label><input type="text" id="hospAr" required></div>
            <div><label>Hospital (English)</label><input type="text" id="hospEn" dir="ltr" required></div>
        </div>
        <div class="grid">
            <div><label>اسم الممارس (عربي)</label><input type="text" id="docAr" required></div>
            <div><label>Practitioner (English)</label><input type="text" id="docEn" dir="ltr" required></div>
        </div>
        <div class="grid">
            <div><label>المسمى الوظيفي (عربي)</label><input type="text" id="jobAr" required></div>
            <div><label>Position (English)</label><input type="text" id="jobEn" dir="ltr" required></div>
        </div>
        <input type="hidden" id="resID">

        <button type="button" class="btn-gen" onclick="printReport()">توليد التقرير النهائي</button>
    </form>
</div>

<script>
    // Hijri conversion helper
    function getHijriValue(dateStr) {
        if(!dateStr) return "";
        const date = new Date(dateStr);
        try {
            let formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura-nu-latn', { day: '2-digit', month: '2-digit', year: 'numeric' });
            let parts = formatter.format(date).split('/');
            return parts[0] + '-' + parts[1] + '-' + parts[2];
        } catch(e) { return ''; }
    }

    // Toggle companion fields
    function switchType() {
        const isCompanion = document.querySelector('input[name="reportType"]:checked').value === 'companion';
        document.getElementById('companionFields').style.display = isCompanion ? 'block' : 'none';
    }

    // calculate duration and hijri dates
    function calc(){
        const dIn = document.getElementById('dIn').value;
        const dOut = document.getElementById('dOut').value;
        if(dIn) document.getElementById('dInHij').value = getHijriValue(dIn);
        if(dOut) document.getElementById('dOutHij').value = getHijriValue(dOut);
        if(dIn && dOut){
            const diff = (new Date(dOut) - new Date(dIn)) / (1000*60*60*24) + 1;
            document.getElementById('dur').value = diff > 0 ? diff : 0;
        }
    }

    // generate 11-digit code
    function generate11Digits() {
        const dOutVal = document.getElementById("dOut").value;
        let targetDate = dOutVal ? new Date(dOutVal) : new Date();
        let yy = targetDate.getFullYear().toString().slice(-2);
        let mm = String(targetDate.getMonth() + 1).padStart(2, '0');
        let dd = String(targetDate.getDate()).padStart(2, '0');
        let datePart = yy + mm + dd;
        let randomPart = Math.floor(10000 + Math.random() * 90000).toString();
        return datePart + randomPart;
    }

    // collect form data
    function collectLeaveRecord(){
        const reportType = document.querySelector('input[name="reportType"]:checked').value;
        const leave = {
            leaveCode: generate11Digits(),
            reportType,
            nameAr: document.getElementById('nameAr').value || '',
            nameEn: document.getElementById('nameEn').value || '',
            natID: document.getElementById('natID').value || '',
            nationAr: document.getElementById('nationAr').value || '',
            dIn: document.getElementById('dIn').value || '',
            dOut: document.getElementById('dOut').value || '',
            dInHij: document.getElementById('dInHij').value || '',
            dOutHij: document.getElementById('dOutHij').value || '',
            dIss: document.getElementById('dIss').value || '',
            dur: document.getElementById('dur').value || '',
            empAr: document.getElementById('empAr').value || '',
            empEn: document.getElementById('empEn').value || '',
            hospAr: document.getElementById('hospAr').value || '',
            hospEn: document.getElementById('hospEn').value || '',
            docAr: document.getElementById('docAr').value || '',
            docEn: document.getElementById('docEn').value || '',
            jobAr: document.getElementById('jobAr').value || '',
            jobEn: document.getElementById('jobEn').value || '',
            serviceCode: document.getElementById('serviceCode').value || '',
            printDateTime: document.getElementById('printDateTime').value || '',
            customLogo: document.getElementById('customLogo').value || '',
            hospLic: document.getElementById('hospLic').value || ''
        };
        if(reportType === 'companion'){
            leave.companionAr = document.getElementById('companionAr').value || '';
            leave.companionEn = document.getElementById('companionEn').value || '';
            leave.relationAr = document.getElementById('relationAr').value || '';
            leave.relationEn = document.getElementById('relationEn').value || '';
        }
        return leave;
    }

    // save to /api/save
    async function saveLeaveToDb(leave){
        try{
            const res = await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ leave }) });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error || 'خطأ في الحفظ');
            return data;
        } catch(err){
            console.error('saveLeaveToDb', err);
            throw err;
        }
    }

    // print: save first then open print window
    async function printReport(){
        const leave = collectLeaveRecord();
        // basic validation
        if(!leave.nameAr || !leave.natID || !leave.hospAr){ alert('يرجى تعبئة الحقول الإلزامية: الاسم، رقم الهوية، واسم المنشأة.'); return; }

        try{
            const saveResp = await saveLeaveToDb(leave);
            console.log('Saved:', saveResp);

            const logoUrl = leave.customLogo || 'https://i.postimg.cc/Jz1sqJ6J/Saudi-Ministry-of-Health-Logo-svg.png';
            const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>تقرير طبي - ${leave.leaveCode}</title><style>body{font-family: 'Noto Sans Arabic', sans-serif; padding:20px} table{width:100%;border-collapse:collapse} td{padding:8px;border-bottom:1px solid #eee} .ar-label{font-weight:700;color:#1e4a7a;width:30%}</style></head><body>`+
                `<h2 style="text-align:center;color:#1e4a7a">${leave.reportType === 'companion' ? 'تقرير مرافقة مريض' : 'تقرير إجازة مرضية'}</h2>`+
                `<table><tr><td class="ar-label">رمز الإجازة</td><td>${leave.leaveCode}</td></tr>`+
                `<tr><td class="ar-label">الاسم (عربي)</td><td>${leave.nameAr}</td></tr>`+
                `<tr><td class="ar-label">الهوية</td><td>${leave.natID}</td></tr>`+
                `<tr><td class="ar-label">تاريخ الدخول</td><td>${leave.dIn}</td></tr>`+
                `<tr><td class="ar-label">تاريخ الخروج</td><td>${leave.dOut}</td></tr>`+
                `<tr><td class="ar-label">المدة (أيام)</td><td>${leave.dur}</td></tr>`+
                `<tr><td class="ar-label">المنشأة</td><td>${leave.hospAr} (${leave.hospEn})</td></tr>`+
                `<tr><td class="ar-label">الطبيب الممارس</td><td>${leave.docAr} (${leave.docEn})</td></tr></table>`+
                `<div style="margin-top:20px;text-align:center"><img src="${logoUrl}" height="100" alt="logo"></div>`+
                `</body></html>`;

            const w = window.open('', '_blank');
            w.document.open(); w.document.write(html); w.document.close();
            setTimeout(()=>{ try{ w.focus(); w.print(); } catch(e){ console.warn('print failed', e); } }, 600);
        } catch(err){
            alert('فشل الحفظ: ' + (err.message || err));
        }
    }

    // small helpers for relation sync and doctor db (basic)
    function syncRelation(dir){
        if(dir === 'ar'){
            const sel = document.getElementById('relationAr');
            const en = sel.options[sel.selectedIndex].dataset.en;
            document.getElementById('relationEn').value = en || '';
        } else {
            const sel = document.getElementById('relationEn');
            const ar = sel.options[sel.selectedIndex].dataset.ar;
            document.getElementById('relationAr').value = ar || '';
        }
    }

    function applyDoctorData(){ /* placeholder: can fill fields when selecting doctor from DB */ }
    function updateFilters(){ /* placeholder: can populate selects based on db */ }

    // set printDateTime default
    window.addEventListener('load', ()=>{
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        const time = now.toTimeString().split(' ')[0].substring(0,5);
        const el = document.getElementById('printDateTime');
        if(el) el.value = `${date}T${time}`;
    });

</script>

</body>
</html>
