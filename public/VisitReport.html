<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشهد مراجعة - Statement of Visit</title>
    <!-- Keep Google Fonts as fallback, but rely on self-hosted fonts for printing -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Times+New+Roman:wght@400;700&display=swap" rel="stylesheet">

    <!-- Preload local fonts (these files must be added to public/fonts/) -->
    <link rel="preload" href="/fonts/NotoSansArabic-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/NotoSansArabic-Bold.woff2" as="font" type="font/woff2" crossorigin>

    <style>
        @font-face {
            font-family: 'Noto Sans Arabic';
            font-style: normal;
            font-weight: 400;
            src: url('/fonts/NotoSansArabic-Regular.woff2') format('woff2');
            font-display: block;
        }
        @font-face {
            font-family: 'Noto Sans Arabic';
            font-style: normal;
            font-weight: 700;
            src: url('/fonts/NotoSansArabic-Bold.woff2') format('woff2');
            font-display: block;
        }

        body { font-family: 'Noto Sans Arabic', sans-serif !important; background: #f0f2f5; padding: 20px; direction: rtl; }
        .form-card { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 12px; border-top: 8px solid #1e4a7a; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Noto Sans Arabic', sans-serif !important; }
        .btn-gen { width: 100%; padding: 18px; background: #1e4a7a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .sh { background: #f8f9fa; padding: 8px; margin: 15px 0; color: #1e4a7a; font-weight: bold; border-right: 4px solid #1e4a7a; }
        .db-section { background: #eff6ff; padding: 15px; border-radius: 8px; border: 1px solid #3b82f6; margin-bottom: 20px; }
        .special-note { font-size: 11px; color: #666; font-weight: normal; margin-top: 2px; }
        .hijri-input { background: #fffdf0 !important; border: 1px solid #ebda8d !important; font-weight: bold; color: #1e4a7a; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center; color:#1e4a7a;" id="formTitle">إدخال بيانات مشهد المراجعة</h2>

    <div class="db-section">
        <div class="sh" style="margin-top:0;">البحث السريع في قاعدة البيانات</div>
        <div class="grid">
            <div><label>المنطقة</label><select id="selRegion" onchange="updateFilters()"><option value="">-- اختر المنطقة --</option></select></div>
            <div><label>نوع المنشأة</label><select id="selType" onchange="updateFilters()"><option value="">-- اختر النوع --</option><option value="خاص">خاص</option><option value="حكومي">حكومي</option></select></div>
        </div>
        <div class="grid">
            <div>
                <label>المنشأة</label>
                <input type="text" id="hospSearch" placeholder="🔍 ابحث باسم المنشأة..." oninput="updateFilters()" style="margin-bottom:6px; background:#fffbe6; border:1px solid #ffe58f;">
                <select id="selHospital" onchange="updateFilters()"><option value="">-- اختر المنشأة --</option></select>
            </div>
            <div><label>التخصص</label><select id="selSpecialty" onchange="updateFilters()"><option value="">-- اختر التخصص --</option></select></div>
        </div>
        <label>اسم الطبيب</label>
        <select id="selDoctor" onchange="applyDoctorData()"><option value="">-- اختر الطبيب الممارس --</option></select>
    </div>

    <form id="reportForm">
        <div class="sh">التوثيق والنظام (توليد آلي)</div>
        <div class="grid">
            <div>
                <label>رمز الخدمة (Service Code)</label>
                <input type="text" id="serviceCode" style="background: #fffbe6; border: 1px solid #ffe58f;">
            </div>
            <div>
                <label>تاريخ ووقت الطباعة</label>
                <input type="datetime-local" id="printDateTime" style="background: #fffbe6; border: 1px solid #ffe58f;">
            </div>
        </div>

        <div class="sh" id="patientSectionTitle">بيانات المريض والتواريخ</div>
        <div class="grid">
            <div><label id="lblNameAr">الاسم (عربي)</label><input type="text" id="nameAr" required></div>
            <div><label id="lblNameEn">Name (English)</label><input type="text" id="nameEn" dir="ltr" required></div>
        </div>

        <!-- rest of the original file unchanged until printReport function -->

    </form>
</div>

<script>
    // (omitting unchanged helpers and db for brevity) - original functions remain

    function getVal(id){ return document.getElementById(id).value || ''; }

    function printReport() {
        const getVal = (id) => document.getElementById(id).value;
        const logoUrl = getVal('customLogo') || "https://i.postimg.cc/Jz1sqJ6J/Saudi-Ministry-of-Health-Logo-svg.png";
        const dInVal = getVal('dIn');
        const dOutVal = getVal('dOut');
        const tIn = fmtTime12(dInVal);
        const tOut = fmtTime12(dOutVal);
        const printDT = new Date(getVal('printDateTime'));
        var h = printDT.getHours(), m = printDT.getMinutes();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        var strTime = (h < 10 ? '0'+h : h) + ':' + (m < 10 ? '0'+m : m) + ' ' + ampm;
        var dateNow = printDT.toLocaleDateString('en-GB', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'});

        var win = window.open('', '_blank');
        var c = '<html><head><meta charset="utf-8">';
        c += '<link rel="preload" href="/fonts/NotoSansArabic-Regular.woff2" as="font" type="font/woff2" crossorigin>';
        c += '<link rel="preload" href="/fonts/NotoSansArabic-Bold.woff2" as="font" type="font/woff2" crossorigin>';
        c += '<style>@font-face{font-family:"Noto Sans Arabic";font-style:normal;font-weight:400;src:url("/fonts/NotoSansArabic-Regular.woff2") format("woff2");font-display:block}@font-face{font-family:"Noto Sans Arabic";font-style:normal;font-weight:700;src:url("/fonts/NotoSansArabic-Bold.woff2") format("woff2");font-display:block}body{margin:0;padding:50px 60px;font-family:"Noto Sans Arabic",serif;direction:rtl;-webkit-print-color-adjust:exact;print-color-adjust:exact}.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;margin-bottom:30px}.h-center{text-align:center}.h-center img{width:220px;margin-top:25px}.t-ar{color:#306db5!important;font-size:28px;font-weight:700;margin-top:18px}.t-en{color:#2c3e77!important;font-size:25px;font-weight:700;font-family:"Times New Roman",serif!important}.link-verify{font-family:"Times New Roman",serif!important;font-size:14px;font-weight:bold;color:blue!important;text-decoration:underline;display:block;line-height:1.1}.btm{display:flex;justify-content:space-between;margin-top:40px;align-items:flex-start}.btm-right{width:48%;padding-right:15px;display:flex;flex-direction:column;align-items:center;text-align:center}.btm-left{width:48%;display:flex;flex-direction:column;align-items:center;text-align:center}.btm-left img{margin-top:-10px!important}.stamp-box{letter-spacing:-0.8px!important}.verify-box{margin-top:5px;text-align:center;width:100%}.date-fix{direction:ltr!important;unicode-bidi:bidi-override!important;display:inline-block;font-family:"Times New Roman",serif!important}.ar-label{font-weight:bold;color:#366fb5!important}.data-cell{color:#2c3e77!important;font-family:"Times New Roman",serif!important}.blue{background-color:#2c3e77!important;color:#ffffff!important}.gray{background-color:#f5f5f5!important}table{width:100%;border-collapse:collapse;margin:25px 0;border:1px solid #d4d4d4;table-layout:fixed}td{border:1px solid #d4d4d4;padding:12px;text-align:center;font-size:16px;height:48px} .date-fix{direction:ltr!important;unicode-bidi:bidi-override!important;display:inline-block;font-family:"Times New Roman",serif!important;color:inherit;font-weight:700!important}</style></head><body onload="window.print()">';

        const titleAr = 'مشهد مراجعة';
        const titleEn = 'Statement of Visit';

        c += '<div class="header">';
        c += '<div style="text-align:right;"><img src="https://i.postimg.cc/k5xY1N5Q/1771635125900.png" height="120"></div>';
        c += '<div class="h-center"><img src="https://i.postimg.cc/L4GwNs4M/1771631857257.png"><div class="t-ar">'+titleAr+'</div><div class="t-en">'+titleEn+'</div></div>';
        c += '<div style="text-align:left;"><img src="https://i.postimg.cc/9QBmnSBw/sht.png" height="80"></div>';
        c += '</div>';

        c += '<table><colgroup><col width="20%"><col width="30%"><col width="30%"><col width="20%"></colgroup>';

        c += '<tr><td class="ar-label">رمز الإجازة</td><td colspan="2" class="data-cell" style="font-size:18px;">'+getVal('serviceCode')+'</td><td class="en-label">Leave ID</td></tr>';

        const cleanHij = (v) => (v || '').replace(/هـ?/g, '').replace(/\s+/g, ' ').trim();
        const dInHijClean = cleanHij(getVal('dInHij'));
        const dOutHijClean = cleanHij(getVal('dOutHij'));

        c += '<tr><td class="ar-label blue">تاريخ الدخول</td>'
           + '<td class="blue"><span class="date-fix">'+dInHijClean+'</span> - <span class="date-fix">'+tIn.ar.split(' ')[0]+'</span> '+tIn.ar.split(' ')[1]+'</td>'
           + '<td dir="ltr" class="blue"><span class="date-fix">'+formatDD(dInVal)+'</span> - <span class="date-fix">'+tIn.en+'</span></td>'
           + '<td class="en-label blue">Admission Date</td></tr>';

        c += '<tr><td class="ar-label blue">تاريخ الخروج</td>'
           + '<td class="blue"><span class="date-fix">'+dOutHijClean+'</span> - <span class="date-fix">'+tOut.ar.split(' ')[0]+'</span> '+tOut.ar.split(' ')[1]+'</td>'
           + '<td dir="ltr" class="blue"><span class="date-fix">'+formatDD(dOutVal)+'</span> - <span class="date-fix">'+tOut.en+'</span></td>'
           + '<td class="en-label blue">Discharge Date</td></tr>';

        c += '<tr><td class="ar-label blue">فترة الانتظار</td>'
           + '<td class="blue">'+waitArabic(dInVal, dOutVal)+'</td>'
           + '<td dir="ltr" class="blue">'+getVal('waitPeriod')+'</td>'
           + '<td class="en-label blue">Waiting Period</td></tr>';

        c += '<tr><td class="ar-label">تاريخ إصدار التقرير</td><td colspan="2" class="data-cell"><span class="date-fix">'+formatDD(getVal('dIss'))+'</span></td><td class="en-label">Issue Date</td></tr>';

        c += '<tr class="gray"><td class="ar-label">الاسم</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('nameAr')+'</td><td class="data-cell">'+getVal('nameEn').toUpperCase()+'</td><td class="en-label">Name</td></tr>';
        c += '<tr><td class="ar-label">رقم الهوية / الإقامة</td><td colspan="2" class="data-cell">'+getVal('natID')+'</td><td class="en-label">National ID / Iqama</td></tr>';
        c += '<tr class="gray"><td class="ar-label">الجنسية</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('nationAr')+'</td><td class="data-cell">Saudi Arabia</td><td class="en-label">Nationality</td></tr>';
        c += '<tr><td class="ar-label">جهة العمل</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('empAr')+'</td><td class="data-cell">'+getVal('empEn').toUpperCase()+'</td><td class="en-label">Employer</td></tr>';
        c += '<tr class="gray"><td class="ar-label">اسم الممارس</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('docAr')+'</td><td class="data-cell">'+getVal('docEn')+'</td><td class="en-label">Practitioner</td></tr>';
        c += '<tr><td class="ar-label">المسمى الوظيفي</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('jobAr')+'</td><td class="data-cell">'+getVal('jobEn')+'</td><td class="en-label">Position</td></tr>';
        c += '<tr class="gray"><td class="ar-label">نوع الزيارة</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('visitTypeAr')+'</td><td class="data-cell">'+getVal('visitTypeEn')+'</td><td class="en-label">Visit Type</td></tr>';
        c += '</table>';

        c += '<div class="btm"><div class="btm-right"><img src="'+logoUrl+'" height="130"><div style="font-weight:700; font-size:14px; margin-top:10px; color:#000000 !important;">'+getVal('hospAr')+'<br><span style="font-family:\'Times New Roman\'; font-weight:700; color:#000000 !important;">'+getVal('hospEn')+'</span><br><span style="font-size:14px; font-weight:700; font-family:\'Noto Sans Arabic\', sans-serif; color:#000000 !important;">'+getVal('hospLic').replace(/class=\'date-fix\'/g, "class=\'date-fix\' style=\'font-weight:bold !important;\'")+'</span></div><div style="margin-top:50px; width:100%; text-align:right;"><img src="https://i.postimg.cc/HsxMYqJX/Smart-Select-20260219-042147-Drive.jpg" height="120"></div></div><div class="btm-divider"></div>';
        c += '<div class="btm-left"><img src="https://i.postimg.cc/RZ5KQNt0/Smart-Select-20260314-050330-Drive.jpg" width="130"><div class="verify-box"><span style="font-size: 13px; font-weight: bold; display: block; line-height: 2.6;">للتحقق من بيانات التقرير يرجى التأكد من زيارة موقع منصة صحة<br>الرسمي</span><span style="font-family:\'Times New Roman\'; font-size: 14px; font-weight: bold; letter-spacing: -0.5px; display: block; line-height: 1.1; margin-top: 1px;">To check the report please visit Seha\'s official website</span><a href="/" target="_blank" class="link-verify">www.seha.sa/#/inquiries/slenquiry</a></div><div class="stamp-box"><span dir="ltr">' + strTime + '</span><br><span>' + dateNow + '</span></div></div></div></body></html>';

        win.document.write(c);
        win.document.close();
    }

    window.onload = function() {
        initFilters();
        updateFilters();
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        const time = now.toTimeString().split(' ')[0].substring(0, 5);
        document.getElementById("printDateTime").value = `${date}T${time}`;
    };
</script>
</body>
</html>
